<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>devTasks</title>
</head>
<body>
    <div class="geral">

        <div class="cabecalho">
            <h1 class="titulo">DevTasks</h1>
            <h3 class="sub">uma aplicação semelhante ao trello</h3>
        </div>
        
        <div class="caixa_input">
            <input type="text" placeholder="Digite a tarefa" class="input_tarefas" id="input_tarefas">
            <button class="btn_addTarefa" id="btn_addTarefa">Adicionar tarefa</button>
        </div>

        <div class="estatistica">
            <button id="totalTarefas" class="totalTarefas">0</button>
            <button id="tarefasProntas" class="tarefasProntas">0</button>
            <button id="tarefasPendentes" class="tarefasPendentes">0</button>
        </div>
        
        <div class="busca">
           <input type="text" id="buscaTarefas" placeholder="🔍 Buscar tarefa..." class="input_busca">
        </div>

        <div>
            <ul class="area_tarefas" id="area_tarefas">

            </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
